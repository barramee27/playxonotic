// Antigravity - default.cfg
// Default server/client configuration

// ── Game settings ──────────────────────────────
set ag_gamemode       "0"       // 0=TDM 1=Bomb 2=Dom 3=Elimination
set ag_fraglimit      "25"
set ag_timelimit      "15"      // minutes
set ag_friendly_fire  "0"
set ag_nextmap        "ag_dust"
set ag_maxplayers     "10"

// ── Network ────────────────────────────────────
set sv_public         "0"       // private server
set sv_maxplayers     "10"
set sv_motd           "Welcome to Antigravity"

// ── Physics ────────────────────────────────────
set sv_gravity        "800"
set sv_maxspeed       "320"
set sv_jumpvelocity   "270"
set pm_airaccelerate  "1"

// ── Visuals ────────────────────────────────────
set r_shadows         "1"
set r_bloom           "0"
set r_water           "1"

// ── Audio ──────────────────────────────────────
set snd_volume        "0.7"
set snd_music_volume  "0.3"

// ── Binds ──────────────────────────────────────
bind w       "+forward"
bind s       "+back"
bind a       "+moveleft"
bind d       "+moveright"
bind SPACE   "+jump"
bind CTRL    "+crouch"
bind SHIFT   "+sprint"
bind MOUSE1  "+attack"
bind MOUSE2  "+attack2"
bind r       "reload"
bind b       "buy_menu"
bind e       "+use"
bind g       "drop_weapon"
bind TAB     "+scoreboard"
bind ESCAPE  "togglemenu"
bind 1       "weapon_slot 0"
bind 2       "weapon_slot 1"
bind 3       "weapon_slot 2"
bind 4       "weapon_slot 3"

// ── Map rotation ───────────────────────────────
set ag_maplist  "ag_dust ag_office ag_warehouse ag_rooftop"
set ag_maplist_shuffle "1"
