<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PlayXonotic - Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1b2838;
      color: #c7d5e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box {
      width: 100%;
      max-width: 340px;
      background: #16202d;
      border-radius: 4px;
      padding: 28px 32px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: white;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      color: #fff;
    }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid #2a475e;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      color: #8f98a0;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab:hover { color: #c7d5e0; }
    .tab.active { color: #66c0f4; border-bottom-color: #66c0f4; }
    .form { display: none; }
    .form.active { display: block; }
    label {
      display: block;
      font-size: 12px;
      color: #8f98a0;
      margin-bottom: 4px;
      margin-top: 14px;
    }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      background: #2a475e;
      border: 1px solid #3d5a6c;
      border-radius: 3px;
      color: #fff;
    }
    input:focus {
      outline: none;
      border-color: #66c0f4;
    }
    input::placeholder { color: #6b7280; }
    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(180deg, #75b022 5%, #588a1b 95%);
      border: none;
      border-radius: 3px;
      color: #fff;
      cursor: pointer;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      font-size: 12px;
      color: #a34f4f;
      margin-top: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">X</div>
    <h1>PlayXonotic</h1>
    <div class="tabs">
      <div class="tab active" data-tab="login">Sign In</div>
      <div class="tab" data-tab="signup">Create Account</div>
    </div>

    <form id="loginForm" class="form active">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      <button type="submit" class="btn">Sign In</button>
      <div class="error" id="loginError"></div>
    </form>

    <form id="signupForm" class="form">
      <label>Username</label>
      <input type="text" name="username" placeholder="username" required autocomplete="username" minlength="3" maxlength="20">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password" minlength="6">
      <button type="submit" class="btn">Create Account</button>
      <div class="error" id="signupError"></div>
    </form>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const forms = document.querySelectorAll('.form');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const loginError = document.getElementById('loginError');
    const signupError = document.getElementById('signupError');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const t = tab.dataset.tab;
        tabs.forEach(x => x.classList.toggle('active', x.dataset.tab === t));
        forms.forEach(f => f.classList.toggle('active', f.id === t + 'Form'));
        loginError.textContent = '';
        signupError.textContent = '';
      });
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.textContent = '';
      const btn = loginForm.querySelector('.btn');
      btn.disabled = true;
      try {
        const { token, user } = await window.electronAPI.authLogin(
          loginForm.email.value.trim(),
          loginForm.password.value
        );
        await window.electronAPI.setToken(token);
        await window.electronAPI.setUser(user);
        window.electronAPI.loginSuccess();
      } catch (err) {
        loginError.textContent = err.message || 'Sign in failed';
      }
      btn.disabled = false;
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      signupError.textContent = '';
      const btn = signupForm.querySelector('.btn');
      btn.disabled = true;
      try {
        const { token, user } = await window.electronAPI.authSignup(
          signupForm.username.value.trim(),
          signupForm.email.value.trim(),
          signupForm.password.value
        );
        await window.electronAPI.setToken(token);
        await window.electronAPI.setUser(user);
        window.electronAPI.loginSuccess();
      } catch (err) {
        signupError.textContent = err.message || 'Create account failed';
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
