server {
    listen 80;
    server_name playxonotic.com www.playxonotic.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name playxonotic.com www.playxonotic.com;

    ssl_certificate /etc/letsencrypt/live/playxonotic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playxonotic.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend (React build)
    root /var/www/playxonotic/frontend;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Game pk3 data files (streamed on demand, already compressed)
    location /game/data/ {
        alias /var/www/playxonotic/game/data/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip off;
        types {
            application/octet-stream pk3;
        }
    }

    # Game WASM files (html, js, wasm, small .data preload)
    location /game/ {
        alias /var/www/playxonotic/game/;
        expires 7d;
        add_header Cache-Control "public, immutable";

        # Required for SharedArrayBuffer (WASM threads)
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";

        # Serve pre-compressed .gz files if available
        gzip_static on;

        gzip on;
        gzip_types application/wasm application/javascript application/octet-stream;
        gzip_min_length 1024;

        # Correct MIME types
        types {
            text/html html;
            application/wasm wasm;
            application/javascript js;
            application/octet-stream data;
        }
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://127.0.0.1:27960;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 256;

    # Max body size
    client_max_body_size 50m;
}
