name: Desktop App Build

on:
  push:
    branches: [main, master]
    paths:
      - 'playxonotic/desktop/**'
      - 'playxonotic/frontend/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          cd playxonotic/desktop
          npm install
          npm run make

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playxonotic-windows
          path: playxonotic/desktop/out/make/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          cd playxonotic/desktop
          npm install
          npm run make

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playxonotic-linux
          path: playxonotic/desktop/out/make/
